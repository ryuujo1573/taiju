name = "taiju"
main = "src/index.ts"
compatibility_date = "2026-03-01"
observability = { enabled = true }

assets = { directory = "public"}

# Cloudflare Analytics Engine (Time Series Storage)
# The dataset name is "metrics" and it will be available as `env.ANALYTICS`
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "metrics"
